<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录/注册 - 校园失物招领</title>
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <a href="index.html" class="logo">校园失物招领</a>
    <a href="index.html" class="btn btn-outline">返回首页</a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">登录</button>
    <button class="auth-tab" onclick="switchTab('register')">注册</button>
  </div>

  <div id="loginForm">
    <div class="card">
      <h2 class="card-title">登录</h2>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="loginEmail" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <div id="loginError" style="color:#dc2626;font-size:13px;margin-bottom:12px;display:none;"></div>
      <button class="btn btn-primary btn-lg" style="width:100%" onclick="handleLogin()">登录</button>
    </div>
  </div>

  <div id="registerForm" style="display:none;">
    <div class="card">
      <h2 class="card-title">注册</h2>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="regEmail" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>手机号（选填）</label>
        <input type="text" id="regPhone" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
      </div>
      <div id="regError" style="color:#dc2626;font-size:13px;margin-bottom:12px;display:none;"></div>
      <button class="btn btn-primary btn-lg" style="width:100%" onclick="handleRegister()">注册</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="static/js/app.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login' && i===0) || (tab==='register' && i===1)));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  
  if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; errEl.style.display = 'block'; return; }
  
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  
  window.location.href = 'index.html';
}

async function handleRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('regError');
  errEl.style.display = 'none';
  
  if (!username || !email || !password) { errEl.textContent = '请填写必填字段'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = '密码至少6位'; errEl.style.display = 'block'; return; }
  
  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { username, phone } }
  });
  
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  
  if (data.user && data.user.identities && data.user.identities.length === 0) {
    errEl.textContent = '该邮箱已注册'; errEl.style.display = 'block'; return;
  }
  
  alert('注册成功！请检查邮箱确认（如有需要），然后登录。');
  switchTab('login');
}
</script>
</body>
</html>
