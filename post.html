<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布信息 - 校园失物招领</title>
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <a href="index.html" class="logo">校园失物招领</a>
    <div id="nav-user"></div>
  </div>
</header>

<div class="container" style="max-width:600px;margin-top:30px;">
  <div class="card">
    <h2 class="card-title">发布失物/招领信息</h2>
    
    <div class="form-group">
      <label>类型 *</label>
      <select id="itemType">
        <option value="lost">寻物启事</option>
        <option value="found">失物招领</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>物品名称 *</label>
      <input type="text" id="title" placeholder="例如：黑色钱包">
    </div>
    
    <div class="form-group">
      <label>分类 *</label>
      <select id="category">
        <option value="">请选择</option>
        <option value="电子产品">电子产品</option>
        <option value="证件卡片">证件卡片</option>
        <option value="书籍文具">书籍文具</option>
        <option value="衣物饰品">衣物饰品</option>
        <option value="生活用品">生活用品</option>
        <option value="其他">其他</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>地点</label>
      <input type="text" id="location" placeholder="例如：图书馆二楼">
    </div>
    
    <div class="form-group">
      <label>日期 *</label>
      <input type="date" id="foundDate">
    </div>
    
    <div class="form-group">
      <label>详细描述</label>
      <textarea id="description" placeholder="请详细描述物品特征、丢失/拾取经过等..."></textarea>
    </div>
    
    <div class="form-group">
      <label>上传图片（可选，最多3张）</label>
      <input type="file" id="imageInput" accept="image/*" multiple onchange="previewImages()" style="padding:8px">
      <div id="imagePreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
    </div>
    
    <div id="error" style="color:#dc2626;font-size:13px;margin-bottom:12px;display:none;"></div>
    
    <button class="btn btn-primary btn-lg" style="width:100%" onclick="submitItem()" id="submitBtn">发布信息</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="static/js/app.js"></script>
<script>
let selectedFiles = [];

document.addEventListener('DOMContentLoaded', async () => {
  updateNav();
  const session = await checkAuth();
  if (!session) { alert('请先登录'); window.location.href = 'auth.html'; return; }
  document.getElementById('foundDate').value = new Date().toISOString().split('T')[0];
});

function previewImages() {
  const input = document.getElementById('imageInput');
  selectedFiles = Array.from(input.files).slice(0, 3);
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = selectedFiles.map((f,i) => 
    `<div style="position:relative"><img src="${URL.createObjectURL(f)}" style="width:100px;height:80px;object-fit:cover;border-radius:8px"><button onclick="removeImage(${i})" style="position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px">x</button></div>`
  ).join('');
}

function removeImage(i) {
  selectedFiles.splice(i, 1);
  previewImages();
}

async function submitItem() {
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('error');
  
  const type = document.getElementById('itemType').value;
  const title = document.getElementById('title').value.trim();
  const category = document.getElementById('category').value;
  const location = document.getElementById('location').value.trim();
  const foundDate = document.getElementById('foundDate').value;
  const description = document.getElementById('description').value.trim();
  
  if (!title) { errEl.textContent = '请输入物品名称'; errEl.style.display = 'block'; return; }
  if (!category) { errEl.textContent = '请选择分类'; errEl.style.display = 'block'; return; }
  if (!foundDate) { errEl.textContent = '请选择日期'; errEl.style.display = 'block'; return; }
  
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '发布中...';
  
  const { data: { session } } = await supabase.auth.getSession();
  
  const { data: item, error: itemError } = await supabase.from('items').insert({
    title, description, category, location, found_date: foundDate,
    item_type: type, user_id: session.user.id
  }).select().single();
  
  if (itemError) {
    errEl.textContent = '发布失败: ' + itemError.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '发布信息';
    return;
  }
  
  // Upload images
  for (const file of selectedFiles) {
    const ext = file.name.split('.').pop();
    const filename = `${item.id}/${Date.now()}.${ext}`;
    
    const { error: uploadError } = await supabase.storage.from('item-images').upload(filename, file);
    if (!uploadError) {
      const { data: { publicUrl } } = supabase.storage.from('item-images').getPublicUrl(filename);
      await supabase.from('images').insert({ item_id: item.id, filename, url: publicUrl.publicUrl });
    }
  }
  
  window.location.href = 'detail.html?id=' + item.id;
}
</script>
</body>
</html>
