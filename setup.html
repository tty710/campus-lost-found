<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员设置</title>
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>
<header class="header">
  <div class="container"><a href="index.html" class="logo">校园失物招领</a></div>
</header>
<div class="container" style="max-width:500px;margin-top:60px">
  <div class="card" style="text-align:center">
    <h2>管理员设置</h2>
    <p id="msg" style="margin:16px 0">检查登录...</p>
    <button class="btn btn-primary btn-lg" id="btn" onclick="makeAdmin()" disabled>设为管理员</button>
    <p id="result" style="margin-top:16px;font-size:14px"></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient('https://edagdtolpmspurnohxkw.supabase.co','sb_publishable_U1ZxM-iEhXxPH4imV2g2AA_Lvqpsri9');

async function makeAdmin() {
  const btn = document.getElementById('btn');
  const result = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = '处理中...';
  
  const {data:{session}} = await supabase.auth.getSession();
  if (!session) { result.innerHTML='<span style="color:red">请先<a href="auth.html">登录</a></span>'; btn.disabled=false; btn.textContent='设为管理员'; return; }
  
  const uid = session.user.id;
  const email = session.user.email;
  
  // 步骤: 删掉旧 profile → 重建带 admin
  const {error:delErr} = await supabase.from('profiles').delete().eq('id', uid);
  
  const {error:insErr} = await supabase.from('profiles').insert({
    id: uid,
    username: email,
    role: 'admin'
  });
  
  if (insErr) {
    result.innerHTML = '<span style="color:red">失败: '+insErr.message+'</span>';
    btn.disabled = false; btn.textContent = '重试';
  } else {
    result.innerHTML = '<span style="color:green;font-size:18px">管理员设置成功！<br><a href="admin.html">进入管理后台</a></span>';
    btn.textContent = '完成';
  }
}

(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = false;
  if (!session) { msg.innerHTML='请先<a href="auth.html">登录</a>'; btn.textContent='去登录'; btn.onclick=()=>location.href='auth.html'; }
  else { msg.textContent='已登录，点击设为管理员'; btn.textContent='设为管理员'; }
})();
</script>
</body>
</html>
