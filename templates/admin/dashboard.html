{% extends "base.html" %}
{% block title %}管理后台 - 校园失物招领{% endblock %}
{% block content %}
<h2>📊 管理后台</h2>
<div class="admin-nav">
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-primary btn-sm">概览</a>
    <a href="{{ url_for('admin.manage_items') }}" class="btn btn-outline btn-sm">物品管理</a>
    <a href="{{ url_for('admin.manage_claims') }}" class="btn btn-outline btn-sm">认领管理</a>
    <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline btn-sm">用户管理</a>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-number">{{ total_users }}</div>
        <div class="stat-label">用户总数</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ total_items }}</div>
        <div class="stat-label">物品总数</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ lost_count }}</div>
        <div class="stat-label">寻物启事</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ found_count }}</div>
        <div class="stat-label">失物招领</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ total_claims }}</div>
        <div class="stat-label">认领申请</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ pending_claims }}</div>
        <div class="stat-label">待处理认领</div>
    </div>
</div>
{% endblock %}
