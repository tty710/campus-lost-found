<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物品详情 - 校园失物招领</title>
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <a href="index.html" class="logo">校园失物招领</a>
    <div id="nav-user"></div>
  </div>
</header>

<div class="container" style="max-width:700px;margin-top:30px;">
  <div id="detailContent">
    <div class="loading">加载中...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="static/js/app.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const itemId = urlParams.get('id');

async function loadDetail() {
  updateNav();
  
  if (!itemId) { document.getElementById('detailContent').innerHTML = '<div class="loading">无效的物品ID</div>'; return; }
  
  const { data: item, error } = await supabase.from('items').select('*, profiles(username), images(*)').eq('id', itemId).single();
  
  if (error || !item) {
    document.getElementById('detailContent').innerHTML = '<div class="loading">物品不存在或已删除</div>';
    return;
  }
  
  const session = await checkAuth();
  const isOwner = session && session.user.id === item.user_id;
  const profile = isOwner ? await getProfile() : null;
  const isAdmin = profile && profile.role === 'admin';
  
  document.getElementById('detailContent').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        ${getTypeBadge(item.item_type)}
        <span class="badge badge-${item.status}">${getStatusText(item.status)}</span>
        ${isOwner ? `<button class="btn btn-sm btn-outline" onclick="updateStatus()">更新状态</button>` : ''}
        ${isAdmin ? `<button class="btn btn-sm btn-danger" onclick="deleteItem()">删除</button>` : ''}
      </div>
      
      <h1 style="font-size:24px;margin-bottom:16px">${item.title}</h1>
      
      ${item.images && item.images.length > 0 ? `
        <div class="detail-images">
          ${item.images.map(img => `<img src="${img.url}" alt="${item.title}" onerror="this.style.display='none'">`).join('')}
        </div>
      ` : ''}
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><strong>分类：</strong>${item.category}</div>
        <div><strong>地点：</strong>${item.location || '未填写'}</div>
        <div><strong>日期：</strong>${formatDate(item.found_date)}</div>
        <div><strong>发布者：</strong>${item.profiles ? item.profiles.username : '未知'}</div>
      </div>
      
      <div style="background:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap;margin-bottom:16px">
        ${item.description || '暂无详细描述'}
      </div>
      
      <div style="color:#999;font-size:13px">发布时间：${formatDate(item.created_at)}</div>
    </div>
    
    ${!isOwner && session && item.status === 'published' ? `
      <div class="card" id="claimCard">
        <h3 class="card-title">申请认领</h3>
        <div class="form-group">
          <label>申请说明</label>
          <textarea id="claimMessage" placeholder="请描述您与物品的关系、物品的详细特征等证明信息..."></textarea>
        </div>
        <div id="claimError" style="color:#dc2626;font-size:13px;margin-bottom:12px;display:none;"></div>
        <button class="btn btn-primary" onclick="submitClaim()">提交认领申请</button>
      </div>
    ` : ''}
    
    ${isAdmin || isOwner ? `
      <div class="card">
        <h3 class="card-title">认领申请列表</h3>
        <div id="claimsList">加载中...</div>
      </div>
    ` : ''}
  `;
  
  if (isAdmin || isOwner) loadClaims();
}

async function loadClaims() {
  const { data: claims, error } = await supabase.from('claims').select('*, profiles:claimant_id(username, phone)').eq('item_id', itemId).order('created_at', { ascending: false });
  
  if (error || !claims || claims.length === 0) {
    document.getElementById('claimsList').innerHTML = '<p style="color:#999">暂无认领申请</p>';
    return;
  }
  
  document.getElementById('claimsList').innerHTML = claims.map(c => `
    <div style="border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong>${c.profiles ? c.profiles.username : '匿名'} ${c.profiles && c.profiles.phone ? '('+c.profiles.phone+')' : ''}</strong>
        <span class="badge badge-${c.status}">${c.status === 'pending' ? '待审核' : c.status === 'approved' ? '已通过' : c.status === 'rejected' ? '已拒绝' : '已完成'}</span>
      </div>
      <p style="color:#666;font-size:14px;margin-bottom:8px">${c.message || '无说明'}</p>
      <div style="font-size:12px;color:#999;margin-bottom:8px">${formatDate(c.created_at)}</div>
      ${c.status === 'pending' ? `
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-success" onclick="handleClaim(${c.id},'approved')">通过</button>
          <button class="btn btn-sm btn-danger" onclick="handleClaim(${c.id},'rejected')">拒绝</button>
        </div>
      ` : ''}
      ${c.status === 'approved' ? `
        <button class="btn btn-sm btn-success" onclick="handleClaim(${c.id},'completed')">标记归还完成</button>
      ` : ''}
    </div>
  `).join('');
}

async function submitClaim() {
  const message = document.getElementById('claimMessage').value.trim();
  const errEl = document.getElementById('claimError');
  if (!message) { errEl.textContent = '请填写申请说明'; errEl.style.display = 'block'; return; }
  
  const { data: { session } } = await supabase.auth.getSession();
  const { error } = await supabase.from('claims').insert({
    item_id: parseInt(itemId), claimant_id: session.user.id, message
  });
  
  if (error) {
    const { data: existing } = await supabase.from('claims').select('id').eq('item_id', parseInt(itemId)).eq('claimant_id', session.user.id);
    if (existing && existing.length > 0) {
      errEl.textContent = '您已经提交过认领申请';
    } else {
      errEl.textContent = '提交失败: ' + error.message;
    }
    errEl.style.display = 'block';
    return;
  }
  
  alert('认领申请已提交！');
  document.getElementById('claimCard').style.display = 'none';
  loadClaims();
}

async function handleClaim(claimId, newStatus) {
  const { error } = await supabase.from('claims').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', claimId);
  if (error) { alert('操作失败: ' + error.message); return; }
  
  if (newStatus === 'completed') {
    await supabase.from('items').update({ status: 'returned' }).eq('id', parseInt(itemId));
  } else if (newStatus === 'approved') {
    await supabase.from('items').update({ status: 'claimed' }).eq('id', parseInt(itemId));
  }
  
  loadDetail();
}

async function updateStatus() {
  const statuses = ['published', 'claimed', 'returned', 'closed'];
  const names = statuses.map(s => getStatusText(s));
  const msg = statuses.map((s,i) => `${i}: ${getStatusText(s)}`).join(', ');
  const choice = prompt('请选择新状态: ' + msg, '0');
  if (choice === null) return;
  const idx = parseInt(choice);
  if (isNaN(idx) || idx < 0 || idx >= statuses.length) { alert('无效选择'); return; }
  
  await supabase.from('items').update({ status: statuses[idx] }).eq('id', parseInt(itemId));
  loadDetail();
}

async function deleteItem() {
  if (!confirm('确定要删除这个物品吗？此操作不可恢复！')) return;
  await supabase.from('items').delete().eq('id', parseInt(itemId));
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', loadDetail);
</script>
</body>
</html>
